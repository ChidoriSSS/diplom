<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удалить участника</title>
</head>
<body>
    <h1>Удалить участника {{ object.user.username }}?</h1>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Да, удалить</button>
        <a href="{% url 'survey_participant_list' survey_id=object.survey_id %}">Отмена</a>
    </form>
</body>
</html>
