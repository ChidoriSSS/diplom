<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% if object %}Редактировать{% else %}Создать{% endif %} вопрос</title>
</head>
<body>
    <h1>{% if object %}Редактирование вопроса{% else %}Новый вопрос{% endif %}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Сохранить</button>
    </form>
    <a href="{% url 'question_list' survey_id=object.survey_id|default:survey_id %}">Отмена</a>
</body>
</html>
